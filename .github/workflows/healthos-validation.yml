name: HealthOS validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r healthos/requirements-dev.txt

      - name: Run medical document recognition tests
        run: python -m pytest healthos/tests
