name: PPTX validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-pptx:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --upgrade pip defusedxml python-pptx

      - name: Generate fixtures
        run: python pptx/evals/make-fixtures.py

      - name: Run PPTX fixture evals
        run: python pptx/evals/run-evals.py
